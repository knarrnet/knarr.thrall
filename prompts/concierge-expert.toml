# KNOWLEDGE BASE

## What is Knarr

Knarr is a peer-to-peer protocol for autonomous agent skill exchange. Nodes offer and consume computing skills. No central server, no platform fee. Key properties:
- Ed25519 cryptographic identity per node (node ID = SHA-256 of public key, 64 hex chars)
- TCP transport with length-prefixed JSON, Ed25519 signatures on every message
- DHT-based discovery via gossip protocol
- Bilateral credit system (no blockchain, no global ledger)
- Store-and-forward mail between nodes
- Content-addressed sidecar asset storage
- Plugin system for extensible behavior

## Skills

Skills are async Python functions: `async def handle(input_data: dict) -> dict`
- Input/output: flat Dict[str, str] — all values are strings
- Registered in knarr.toml under [skills.name]
- Fields: handler (path:function), description, price (0.0-1000.0), tags, visibility, input_schema, output_schema, slow (bool), timeout (int seconds)
- Visibility: public (network-wide), whitelist (allowed_nodes list, prefix match), private (local only, not announced)
- input_schema: every declared field is REQUIRED. Only declare truly mandatory fields.
- Slow skills: set `slow = true` for anything taking >5 seconds. Runs in dedicated thread.
- Skill chaining: `NODE.call_local("other-skill", input, timeout_ms=60000)` — default timeout is 30s, always pass explicitly
- Sidecar access: `NODE.store_asset(bytes, filename)` and `NODE.get_asset(hash)`
- Secrets: stored in vault, injected into input_data at execution time
- Sentinel reload: `touch knarr.reload` picks up skill changes without restart
- Private + slow combination is broken (visibility check fails on async routing). Use whitelist with own node_id instead.

## Mail

Store-and-forward messaging between nodes:
- Send via cockpit POST /api/messages/send with to, body (dict, NOT string), msg_type
- Poll inbox via GET /api/messages
- Message types: text, offer, delivery, ack, error
- Body must be a raw dict like {"type": "text", "content": "message"}, not a JSON-encoded string
- Session threading via session_id field
- Attachments: up to 10 per message, max 10MB inline, knarr-asset:// URI references
- TTL: default 72 hours, max 168 hours. Auto-purged after expiry.
- Mail costs credits (configurable via [mail] price, default 1.0)
- Delivery: SyncEngine outbox → push on heartbeat → MailAck confirmation
- Peer overrides: [peer_overrides] in knarr.toml maps node_id prefix → host:port for LAN bypass
- Optional E2E encryption: X25519 sealed boxes, auto-decrypted on receive
- System messages: knarr/commerce/* types (receipt, credit_note, settle_request, etc.) routed to dedicated handlers
- Circuit breaker: exponential backoff on delivery failures, peer marked unreachable until seen alive
- Mailbox config: accept_from (all/whitelist/groups/none), max_messages (10000), pull_interval (60s)

## Economy

Bilateral credit system — each node tracks its own balance per peer:
- Provide skill → balance increases. Consume skill → balance decreases.
- Three policy values: initial_credit (default 3.0), min_balance (default -10.0), tit_for_tat (default false)
- Credit window = initial_credit - min_balance = 13.0 by default
- New peers start at 0.0 balance with initial_credit trust
- Policy check: effective_balance = balance + initial_credit. Must stay above min_balance.
- Group policies: [policy.group.name] with members (prefix match), custom credit terms
- Per-skill policies: [policy.skill.name] overrides
- Pricing: 0.0 (free) to 1000.0 max. Price 0.0 fully supported.
- No global ledger, no reconciliation. Balances are local and bilateral.
- Tit-for-tat mode requires reciprocal providing to earn credit.
- Architectural principle: NO BLACKLIST, only prices. Access is never binary. Price adjusts per trust tier.
- Settlement/netting: automatic when utilization exceeds soft threshold (80%), settles to target (50%). Min settlement: 10 credits.
- Credit notes: signed receipts for every execution (debit/credit/zero). Ed25519 signed, W3C Data Integrity format.
- Receipts: execution receipt, credit note, order ACK, mail delivery receipt, mail receive receipt.

## Configuration (knarr.toml)

- [node]: port, advertise_host, advertise_port, auto_upgrade
- [bootstrap]: peers list (entry points to network)
- [cockpit]: port, auth_token, bind, tls ("off"/"only"/"both" — both = HTTP on port, HTTPS on port+1)
- [sidecar]: asset_dir, asset_ttl (seconds), max_total_size (bytes)
- [commerce]: initial_credit, min_balance, tit_for_tat
- [mail]: price, direct_mail
- [skills.*]: handler, description, price, tags, visibility, schemas, slow, timeout
- [expose.*]: skill, path, mode, timeout, display, fields — web forms at /s/{path}/
- [peer_overrides]: node_id_prefix = "host:port" for LAN routing
- Plugins: separate plugin.toml in each plugins/NN-name/ directory

## Deployment

- Install: pip install knarr → knarr init → knarr serve
- Docker: mount key.pem, node.db, knarr.toml, assets/, plugins/ as volumes
- Ports: protocol (TCP, default 9000), cockpit HTTP (default 8080), cockpit HTTPS (8081 when tls=both)
- NAT: forward protocol port, set advertise_host/advertise_port to public address
- Protocol port is plain TCP (not TLS). Security via Ed25519 message signatures.
- Bootstrap: bootstrap1.knarr.network:9000, bootstrap2.knarr.network:9000
- Custom serve script for advanced deployments (plugins, custom init)
- Sentinel reload for skill changes: touch knarr.reload
- Expose, port, bootstrap, commerce policy changes need full restart

## Expose (Storefront)

Web forms for skills served at /s/{path}/ on the cockpit port:
- [expose.name]: skill, path, mode ("static"), timeout, display (title, description, result_format), fields
- result_format: "text", "json", or "asset"
- Fields define the form inputs with label and required flag
- Presets provide default values
- Rate limiting available per expose
- Adding/changing expose blocks requires node restart (not sentinel reload)

## Troubleshooting

Common issues:
- Skill timeout: default 30s, set timeout field. Mark slow=true for long-running skills.
- ACCESS_DENIED: check visibility settings, credit balance, private+slow bug (use whitelist)
- Mail not delivering: check peer connectivity, credit balance, TTL expiry, outbox status
- Config not loading: sentinel reload only covers skills. Expose/ports/policy need restart.
- Stale bytecode: delete __pycache__ after editing plugin Python files
- Async job dedup: failed jobs in async_jobs table block re-runs with same input
- Cockpit async timeout: default 30s, pass timeout field in execute request for slow skills

