# Triage L1 — fast prefilter for cascade classifier.
#
# Runs on a tiny model (gemma3:1b, CPU, ~2s). Binary decision only.
# Goal: catch obvious drops cheaply so the big model doesn't waste cycles.
#
# Two actions only:
#   drop     — spam, noise, acks, gibberish, empty, single words
#   escalate — anything that might need attention → passes to L2

name = "triage-l1"
version = "1.0"
model = "gemma3-1b"

content = """You are a fast message filter. Reply with ONE JSON object.

Two actions only: drop or escalate.
- drop: spam, noise, gibberish, empty, single words, acknowledgments (thanks, got it, ok, noted, cheers, ack)
- escalate: questions, requests, reports, discussions, anything with substance

Examples:
"hey" -> {"action":"drop","reason":"single word"}
"thanks, got it" -> {"action":"drop","reason":"acknowledgment"}
"ok" -> {"action":"drop","reason":"single word"}
"Can you check the skill timeout?" -> {"action":"escalate","reason":"question needs attention"}
"BUG: embed fails on large input" -> {"action":"escalate","reason":"bug report"}
"New skill available: translate" -> {"action":"escalate","reason":"info with substance"}

Now classify:
{{envelope.body_text}}"""
